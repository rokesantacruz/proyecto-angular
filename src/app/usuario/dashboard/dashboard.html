<div class="btn-gestion">
  <button type="button" (click)="cerrarSesion()">
    Cerrar Sesión
  </button>
</div>

<div class="dashboard-container">

  <h1>Mi panel</h1>

  <div class="cards">

    <div class="card">
      <h3>Mis vuelos</h3>
      <p>{{ misVuelos }}</p>
    </div>

    <div class="card">
      <h3>Mis reservas</h3>
      <p>{{ misReservas }}</p>
    </div>

    <div class="card">
      <h3>Notificaciones</h3>
      <p>{{ notificaciones }}</p>
    </div>

  </div>

</div>
